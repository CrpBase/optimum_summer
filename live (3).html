<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Мій персонаж — AR</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html,body { height:100%; overflow:hidden; background:#000; font-family:-apple-system,system-ui,sans-serif; -webkit-user-select:none; user-select:none; }
    #cam { position:fixed; inset:0; width:100vw; height:100vh; object-fit:cover; z-index:0; background:#000; }
    a-scene, .a-canvas, canvas.a-canvas { position:fixed !important; inset:0; width:100vw !important; height:100vh !important; z-index:1 !important; background:transparent !important; }
    #ui { position:fixed; right:16px; bottom:28px; z-index:4; display:flex; flex-direction:column; gap:12px; }
    #ui button { width:56px; height:56px; border-radius:50%; border:none; background:rgba(255,255,255,.92); color:#111; font-size:28px; font-weight:700; box-shadow:0 6px 20px rgba(0,0,0,.35); }
    #tip { position:fixed; left:0; right:0; bottom:100px; z-index:4; text-align:center; color:#fff; font-size:13px; text-shadow:0 1px 4px #000; opacity:.8; pointer-events:none; }
    #start { position:fixed; inset:0; z-index:5; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px; background:radial-gradient(circle at 50% 40%,#14151c,#050507); color:#fff; text-align:center; padding:24px; }
    #start h1 { font-size:20px; font-weight:600; }
    #start p { font-size:14px; opacity:.6; max-width:280px; }
    #start button { margin-top:8px; background:#c8ff2f; color:#0b0b0f; border:none; border-radius:999px; padding:15px 34px; font-size:17px; font-weight:700; }
    #start.hidden, #ui.hidden, #tip.hidden { display:none; }
    #err { position:fixed; bottom:16px; left:16px; right:90px; z-index:6; color:#ffd166; font-size:13px; text-shadow:0 1px 3px #000; }
  </style>
</head>
<body>
  <video id="cam" autoplay muted playsinline webkit-playsinline></video>

  <a-scene embedded vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false"
    renderer="alpha: true; colorManagement: true; physicallyCorrectLights: true" transparent-bg>
    <a-assets>
      <a-asset-item id="char" src="neon-explorer-web.glb"></a-asset-item>
    </a-assets>

    <a-entity light="type: ambient; intensity: 1.15"></a-entity>
    <a-entity light="type: directional; intensity: 0.7" position="1 2 1"></a-entity>

    <a-gltf-model id="model"
      src="#char"
      position="0 -1.5 -3"
      rotation="0 0 0"
      scale="2 2 2"
      dance></a-gltf-model>

    <a-camera position="0 0 0"
      look-controls="magicWindowTrackingEnabled: true; mouseEnabled: false; touchEnabled: false"
      wasd-controls="enabled: false"></a-camera>
  </a-scene>

  <div id="tip">Один палець — крутити • Два пальці — розмір</div>
  <div id="ui">
    <button id="plus">+</button>
    <button id="minus">−</button>
  </div>

  <div id="start">
    <h1>Мій персонаж 🦊</h1>
    <p>Увімкни камеру. Персонаж з'явиться перед тобою — крути телефон, і він лишатиметься на місці.</p>
    <button id="go">Увімкнути камеру</button>
  </div>
  <div id="err"></div>

  <script>
    AFRAME.registerComponent('transparent-bg', {
      init: function () {
        const apply = () => { const r=this.el.renderer; if(r){ r.setClearColor(0x000000,0); r.setClearAlpha(0);} };
        if (this.el.renderer) apply(); else this.el.addEventListener('render-target-loaded', apply);
        this.el.addEventListener('loaded', apply);
      }
    });

    // Пряме програвання анімації через three.js — не залежить від сторонніх компонентів
    AFRAME.registerComponent('dance', {
      init: function () {
        this.mixer = null;
        const err = document.getElementById('err');
        this.el.addEventListener('model-error', ()=>{ err.textContent='❌ Модель не завантажилась — перевір neon-explorer-web.glb у репозиторії.'; });
        this.el.addEventListener('model-loaded', (e) => {
          const mesh = this.el.getObject3D('mesh');
          let clips = [];
          if (mesh && mesh.animations && mesh.animations.length) clips = mesh.animations;
          else if (e.detail && e.detail.model && e.detail.model.animations) clips = e.detail.model.animations;
          if (!clips || !clips.length) { err.textContent='⚠️ Анімацій у файлі: 0'; return; }
          this.mixer = new THREE.AnimationMixer(mesh);
          const action = this.mixer.clipAction(clips[0]);
          action.reset(); action.setLoop(THREE.LoopRepeat, Infinity); action.play();
          err.textContent=''; // все ок
        });
      },
      tick: function (t, dt) { if (this.mixer && dt) this.mixer.update(dt/1000); }
    });

    const model = document.getElementById('model');
    let scale = 2, rotY = 0;
    const apply = () => { model.setAttribute('scale', scale+' '+scale+' '+scale); model.setAttribute('rotation','0 '+rotY+' 0'); };
    const clamp = (v,a,b)=>Math.max(a,Math.min(b,v));
    document.getElementById('plus').onclick  = ()=>{ scale=clamp(scale*1.2,0.3,10); apply(); };
    document.getElementById('minus').onclick = ()=>{ scale=clamp(scale/1.2,0.3,10); apply(); };

    let startDist=0, startScale=2, lastX=0;
    const dist = (t)=>Math.hypot(t[0].clientX-t[1].clientX, t[0].clientY-t[1].clientY);
    window.addEventListener('touchstart', (e)=>{
      if (e.target.closest('#ui')||e.target.closest('#start')) return;
      if (e.touches.length===2){ startDist=dist(e.touches); startScale=scale; }
      else if (e.touches.length===1){ lastX=e.touches[0].clientX; }
    }, {passive:true});
    window.addEventListener('touchmove', (e)=>{
      if (e.target.closest('#ui')||e.target.closest('#start')) return;
      if (e.touches.length===2 && startDist>0){ scale=clamp(startScale*(dist(e.touches)/startDist),0.3,10); apply(); }
      else if (e.touches.length===1){ const x=e.touches[0].clientX; rotY += (x-lastX)*0.5; lastX=x; apply(); }
    }, {passive:true});
    window.addEventListener('touchend', ()=>{ startDist=0; }, {passive:true});

    const cam=document.getElementById('cam'), startEl=document.getElementById('start'), err=document.getElementById('err');
    document.getElementById('go').addEventListener('click', async ()=>{
      try {
        if (typeof DeviceOrientationEvent!=='undefined' && typeof DeviceOrientationEvent.requestPermission==='function'){ try { await DeviceOrientationEvent.requestPermission(); } catch(_){} }
        let stream;
        try { stream = await navigator.mediaDevices.getUserMedia({ video:{ facingMode:{ideal:'environment'} }, audio:false }); }
        catch(e1){ stream = await navigator.mediaDevices.getUserMedia({ video:true, audio:false }); }
        cam.srcObject=stream; await cam.play(); startEl.classList.add('hidden');
      } catch(e){ err.style.color='#ff6b6b'; err.textContent='Камера не увімкнулась: '+(e&&e.message?e.message:e); }
    });
  </script>
</body>
</html>
